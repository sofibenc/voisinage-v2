<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#1E293B"/>

  <!-- Two house silhouettes side by side, forming a neighborhood -->
  <!-- Left house -->
  <polygon points="130,210 196,145 262,210" fill="#38BDF8"/>
  <rect x="148" y="210" width="96" height="90" fill="#38BDF8"/>
  <rect x="183" y="240" width="28" height="60" fill="#1E293B"/>

  <!-- Right house -->
  <polygon points="250,225 316,155 382,225" fill="#7DD3FC"/>
  <rect x="268" y="225" width="96" height="80" fill="#7DD3FC"/>
  <rect x="303" y="255" width="28" height="50" fill="#1E293B"/>

  <!-- Shared ground line -->
  <rect x="110" y="300" width="292" height="6" rx="3" fill="#475569"/>

  <!-- "P" parking badge bottom right -->
  <circle cx="390" cy="370" r="52" fill="#38BDF8"/>
  <text x="390" y="390" font-family="Arial Black, Arial" font-weight="900" font-size="54"
        text-anchor="middle" fill="#0F172A">P</text>
</svg>
